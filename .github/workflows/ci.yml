name: CI

# Quality gate. Added 2026-05-16 after several broken changes reached
# production (unauthenticated status endpoint; a non-existent
# subscriptions.amount_inr column that 500'd workspace creation for every
# new customer). Nothing ran pytest/tsc on push before this.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (pytest + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskora/apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Syntax check (all modules)
        run: |
          python -m compileall -q routers *.py tasks
      - name: Test suite (blocking)
        # The ENTIRE suite must be green to merge. Previously only a 4-file
        # subset gated and the rest ran `|| true` (non-blocking) because some
        # legacy suites were brittle — those have since been fixed, so a full
        # green run now gates every push/PR (incl. billing webhook + bulk-update
        # approval-bypass regressions).
        run: python -m pytest -q

  web:
    name: web (tsc + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskora/apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taskora/apps/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check (blocking)
        run: npx tsc --noEmit
      - name: Lint (informational)
        run: npm run lint || true
