name: Security Audit

# Two scan layers on different cadences:
#   - code-scan (gitleaks + bandit): runs on EVERY PR + weekly. Fast, low
#     false-positive — gates merges so no new secret or high-severity SAST
#     finding lands on main.
#   - dependency-audit (pip-audit + npm audit): WEEKLY only. Dependency CVEs are
#     a baseline/backlog concern (fixes often need coordinated framework
#     upgrades, e.g. starlette<->fastapi), so they're tracked on a schedule and
#     open an issue on failure rather than blocking unrelated feature PRs.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  code-scan:
    name: secret + SAST scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan past commits
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1
      - name: SAST (bandit)
        if: always()
        run: |
          python -m pip install bandit
          bandit -r taskora/apps/backend \
            -x taskora/apps/backend/tests,taskora/apps/backend/.venv,taskora/apps/backend/venv \
            --severity-level high --confidence-level medium

  dependency-audit:
    name: dependency audit
    # Weekly / manual only — not a per-PR gate (see header).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Run dependency audit
        run: bash taskora/scripts/security-audit.sh
      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed (${day})`,
              body: `The weekly dependency audit found high/critical advisories.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["security"],
            });
