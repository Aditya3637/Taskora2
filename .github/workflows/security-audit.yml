name: Security Audit

# Weekly dependency vulnerability scan (audit L14). Runs the existing
# scripts/security-audit.sh (pip-audit for the backend + npm audit for the
# web app). Fails on high/critical advisories; opens a tracking issue when
# the *scheduled* run fails so a regression isn't missed.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Run security audit
        run: bash taskora/scripts/security-audit.sh
      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed (${day})`,
              body: `The weekly dependency audit found high/critical advisories.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["security"],
            });
