name: Security Audit

# Weekly security scan. Three layers, each blocking:
#   - dependency vulnerabilities  → scripts/security-audit.sh (pip-audit + npm audit)
#   - secret leaks                → gitleaks (full git history)
#   - static analysis / SAST      → bandit (backend Python)
# All run via `if: always()` so one failure doesn't mask the others. A failed
# *scheduled* run opens a tracking issue so a regression isn't missed.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: dependency + secret + SAST scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan past commits
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1
      - name: SAST (bandit)
        if: always()
        run: |
          python -m pip install bandit
          bandit -r taskora/apps/backend \
            -x taskora/apps/backend/tests,taskora/apps/backend/.venv,taskora/apps/backend/venv \
            --severity-level high --confidence-level medium
      - name: Install pip-audit
        if: always()
        run: python -m pip install pip-audit
      - name: Run dependency audit
        if: always()
        run: bash taskora/scripts/security-audit.sh
      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed (${day})`,
              body: `The weekly dependency audit found high/critical advisories.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["security"],
            });
