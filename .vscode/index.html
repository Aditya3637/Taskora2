<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SmartWorks PMS" />
    <meta name="theme-color" content="#4F46E5" />
    <title>SmartWorks — Chairman's Office</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #F8FAFC;
            color: #0F172A;
            -webkit-font-smoothing: antialiased
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 2px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        input,
        select,
        textarea,
        button {
            font-family: inherit;
            font-size: 14px
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        #content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px
        }

        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #E2E8F0;
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0)
        }

        .nav-btn {
            flex: 1;
            padding: 10px 4px 8px;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #94A3B8;
            cursor: pointer
        }

        .nav-btn.active {
            color: #4F46E5
        }

        .nav-btn .icon {
            font-size: 20px;
            line-height: 1
        }

        .nav-btn .lbl {
            font-size: 9.5px;
            font-weight: 400
        }

        .nav-btn.active .lbl {
            font-weight: 700
        }

        @media(min-width:768px) {
            #bottom-nav {
                display: none
            }

            #sidebar {
                width: 210px;
                background: #fff;
                border-right: 1px solid #E2E8F0;
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                display: flex;
                flex-direction: column;
                padding: 24px 0 16px;
                z-index: 50
            }

            .sb-brand {
                padding: 0 20px 28px
            }

            .sb-brand .name {
                font-size: 13px;
                font-weight: 700;
                color: #4F46E5;
                letter-spacing: .05em;
                text-transform: uppercase
            }

            .sb-brand .sub {
                font-size: 11px;
                color: #94A3B8;
                margin-top: 3px
            }

            .sb-btn {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 11px 20px;
                background: none;
                border: none;
                border-left: 3px solid transparent;
                color: #64748B;
                font-weight: 400;
                font-size: 14px;
                width: 100%;
                text-align: left;
                cursor: pointer
            }

            .sb-btn.active {
                background: #F5F3FF;
                color: #4F46E5;
                font-weight: 600;
                border-left-color: #4F46E5
            }

            .sb-btn .icon {
                font-size: 17px
            }

            #content {
                margin-left: 210px;
                padding-bottom: 40px;
                max-width: 820px
            }
        }

        @media(max-width:767px) {
            #sidebar {
                display: none
            }
        }

        .page {
            padding: 14px;
            display: none
        }

        .page.active {
            display: block
        }

        .card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #E2E8F0;
            padding: 14px;
            margin-bottom: 10px
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px
        }

        .stat-card {
            border-radius: 14px;
            padding: 14px 16px
        }

        .stat-n {
            font-size: 28px;
            font-weight: 700;
            line-height: 1
        }

        .stat-l {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
            font-weight: 500
        }

        .badge {
            display: inline-flex;
            align-items: center;
            font-size: 10px;
            font-weight: 600;
            border-radius: 99px;
            padding: 2px 8px;
            white-space: nowrap
        }

        .prog-wrap {
            height: 4px;
            background: #F1F5F9;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            margin-left: 22px
        }

        .prog-bar {
            height: 100%;
            border-radius: 2px
        }

        .form-group {
            margin-bottom: 13px
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .06em;
            display: block
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            background: #F8FAFC;
            font-size: 14px;
            color: #0F172A;
            outline: none
        }

        .form-input:focus {
            border-color: #4F46E5
        }

        textarea.form-input {
            min-height: 68px;
            resize: vertical
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .btn-primary {
            padding: 11px 18px;
            border-radius: 9px;
            background: #4F46E5;
            color: #fff;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer
        }

        .btn-primary:disabled {
            background: #A5B4FC;
            cursor: default
        }

        .btn-ghost {
            padding: 11px 18px;
            border-radius: 9px;
            background: #F1F5F9;
            color: #475569;
            border: 1px solid #E2E8F0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer
        }

        .btn-sm {
            padding: 7px 13px;
            font-size: 12px
        }

        .btn-row {
            display: flex;
            gap: 9px
        }

        .btn-row .btn-ghost {
            flex: 1
        }

        .btn-row .btn-primary {
            flex: 2
        }

        .mini-btn {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            white-space: nowrap
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 400;
            display: none;
            align-items: flex-end;
            justify-content: center
        }

        #overlay.open {
            display: flex;
            animation: fadeIn .15s
        }

        #sheet {
            background: #fff;
            width: 100%;
            max-width: 480px;
            border-radius: 20px 20px 0 0;
            max-height: 92vh;
            overflow-y: auto;
            padding-bottom: 24px;
            animation: slideUp .2s ease-out
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: #CBD5E1;
            border-radius: 2px;
            margin: 14px auto
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 18px
        }

        .sheet-title {
            font-size: 17px;
            font-weight: 700
        }

        .sheet-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #F1F5F9;
            border: none;
            font-size: 18px;
            color: #64748B;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .sheet-body {
            padding: 0 16px 16px
        }

        @media(min-width:768px) {
            #overlay {
                align-items: center
            }

            #sheet {
                border-radius: 16px;
                max-width: 440px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, .15)
            }

            #sheet.wide {
                max-width: 580px
            }

            .sheet-handle {
                display: none
            }
        }

        .av {
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0
        }

        .color-swatches {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-sizing: border-box
        }

        .color-swatch.selected {
            border-color: #0F172A
        }

        .task-row {
            background: #fff;
            border-radius: 11px;
            padding: 10px 12px;
            margin-bottom: 7px;
            border: 1px solid #E2E8F0;
            border-left: 3px solid #CBD5E1
        }

        .task-row.overdue {
            border-color: #FECACA;
            border-left-color: #DC2626
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
            margin-top: 4px
        }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0
        }

        .pills {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            overflow-x: auto;
            padding-bottom: 4px
        }

        .pill {
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            background: #F1F5F9;
            color: #64748B;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer
        }

        .pill.active {
            background: #4F46E5;
            color: #fff
        }

        .sub-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 11px;
            background: #F8FAFC;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #E2E8F0;
            margin-bottom: 2px
        }

        .bldg-pb-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 11px;
            background: #F8FAFC;
            border-radius: 10px;
            margin-bottom: 5px;
            border: 1px solid #E2E8F0;
            cursor: pointer
        }

        .msg-preview {
            background: #F8FAFC;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #334155;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 240px;
            overflow: auto;
            white-space: pre-wrap;
            border: 1px solid #E2E8F0
        }

        .wa-btn {
            flex: 2;
            padding: 11px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            background: #22C55E;
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer
        }

        .copy-btn {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            background: #F1F5F9;
            color: #475569;
            border: 1px solid #E2E8F0;
            cursor: pointer
        }

        .copy-btn.copied {
            background: #D1FAE5;
            color: #065F46;
            border-color: #A7F3D0
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #94A3B8
        }

        .import-hint {
            font-size: 13px;
            color: #64748B;
            line-height: 1.6;
            background: #F8FAFC;
            padding: 10px 12px;
            border-radius: 9px;
            border: 1px solid #E2E8F0;
            margin-bottom: 12px
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="sidebar">
            <div class="sb-brand">
                <div class="name">SmartWorks</div>
                <div class="sub">Chairman's Office PMS</div>
            </div>
            <button class="sb-btn active" data-tab="dash"><span class="icon">⌂</span> Home</button>
            <button class="sb-btn" data-tab="projects"><span class="icon">📋</span> Projects</button>
            <button class="sb-btn" data-tab="buildings"><span class="icon">🏢</span> Buildings</button>
            <button class="sb-btn" data-tab="people"><span class="icon">👥</span> People</button>
            <button class="sb-btn" data-tab="digest"><span class="icon">📤</span> Digest</button>
        </div>
        <div id="content">
            <div id="tab-dash" class="page active"></div>
            <div id="tab-projects" class="page"></div>
            <div id="tab-buildings" class="page"></div>
            <div id="tab-people" class="page"></div>
            <div id="tab-digest" class="page"></div>
        </div>
        <div id="bottom-nav">
            <button class="nav-btn active" data-tab="dash"><span class="icon">⌂</span><span
                    class="lbl">Home</span></button>
            <button class="nav-btn" data-tab="projects"><span class="icon">📋</span><span
                    class="lbl">Projects</span></button>
            <button class="nav-btn" data-tab="buildings"><span class="icon">🏢</span><span
                    class="lbl">Buildings</span></button>
            <button class="nav-btn" data-tab="people"><span class="icon">👥</span><span
                    class="lbl">People</span></button>
            <button class="nav-btn" data-tab="digest"><span class="icon">📤</span><span
                    class="lbl">Digest</span></button>
        </div>
    </div>
    <div id="overlay">
        <div id="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <div class="sheet-title" id="sheet-title"></div><button class="sheet-close"
                    id="sheet-close-btn">×</button>
            </div>
            <div class="sheet-body" id="sheet-body"></div>
        </div>
    </div>
    <script>
        const SK = 'sw_pms_v1';
        const EMPTY = { buildings: [], people: [], projects: [], subs: [], tasks: [], pb: [] };
        let DB = { ...EMPTY };
        function loadDB() { try { const r = localStorage.getItem(SK); if (r) DB = { ...EMPTY, ...JSON.parse(r) }; } catch (e) { } }
        function saveDB() { try { localStorage.setItem(SK, JSON.stringify(DB)); } catch (e) { } }
        loadDB();
        const TS = { not_started: { l: 'Not started', bg: '#F1F5F9', c: '#475569' }, in_progress: { l: 'In progress', bg: '#FFFBEB', c: '#B45309' }, blocked: { l: 'Blocked', bg: '#FEF2F2', c: '#B91C1C' }, awaiting: { l: 'Awaiting', bg: '#F5F3FF', c: '#6D28D9' }, done: { l: 'Done', bg: '#F0FDF4', c: '#15803D' }, deferred: { l: 'Deferred', bg: '#F8FAFC', c: '#64748B' } };
        const BS = { not_started: { l: 'Not started', bg: '#F1F5F9', c: '#64748B' }, in_progress: { l: 'In progress', bg: '#FFFBEB', c: '#B45309' }, on_hold: { l: 'On hold', bg: '#FFF7ED', c: '#C2410C' }, blocked: { l: 'Blocked', bg: '#FEF2F2', c: '#B91C1C' }, done: { l: 'Done', bg: '#F0FDF4', c: '#15803D' } };
        const PR = { high: { l: 'High', c: '#DC2626' }, medium: { l: 'Med', c: '#D97706' }, low: { l: 'Low', c: '#16A34A' } };
        const CLRS = ['#4F46E5', '#0891B2', '#059669', '#DC2626', '#D97706', '#7C3AED', '#DB2777', '#0F766E', '#EA580C', '#0369A1'];
        const SCYC = ['not_started', 'in_progress', 'awaiting', 'blocked', 'done'];
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const td = () => new Date().toISOString().slice(0, 10);
        const fd = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '';
        const isOD = (d, s) => !!(d && d < td() && s !== 'done');
        const nowFull = () => new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        const bdg = (s, sys) => { const i = (sys || TS)[s] || TS.not_started; return `<span class="badge" style="background:${i.bg};color:${i.c};border:1px solid ${i.c}33">${i.l}</span>`; };
        const av = (n, c, sz = 30) => { const i = (n || '?').trim().split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(); return `<div class="av" style="width:${sz}px;height:${sz}px;background:${c || '#4F46E5'};font-size:${sz * .36}px">${i}</div>`; };
        const val = id => { const e = document.getElementById(id); return e ? e.value : ''; };

        // TABS
        let curTab = 'dash';
        function switchTab(id) {
            curTab = id;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn,.sb-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
            renderTab(id);
        }
        document.querySelectorAll('.nav-btn,.sb-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

        // SHEET
        function openSheet(title, html, wide) {
            document.getElementById('sheet-title').textContent = title;
            document.getElementById('sheet-body').innerHTML = html;
            document.getElementById('sheet').classList.toggle('wide', !!wide);
            document.getElementById('overlay').classList.add('open');
        }
        function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
        document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeSheet(); });
        document.getElementById('sheet-close-btn').addEventListener('click', closeSheet);

        // COLOR PICKER
        function colorPicker(fid, cur) {
            return `<div class="form-group"><label class="form-label">Color</label><div class="color-swatches">${CLRS.map(c => `<div class="color-swatch${c === cur ? ' selected' : ''}" style="background:${c}" onclick="selColor('${fid}','${c}')"></div>`).join('')}</div><input type="hidden" id="${fid}" value="${cur || CLRS[0]}"></div>`;
        }
        function selColor(fid, color) {
            document.getElementById(fid).value = color;
            document.querySelectorAll(`#sheet-body .color-swatches .color-swatch`).forEach(s => s.classList.toggle('selected', s.style.background === color || s.getAttribute('onclick').includes(`'${color}'`)));
            // re-highlight properly
            const swatches = document.querySelectorAll(`#sheet-body .color-swatches .color-swatch`);
            swatches.forEach(s => { const oc = s.getAttribute('onclick'); s.classList.toggle('selected', oc && oc.includes(`,'${color}'`)); });
        }
        function statusSel(id, cur, sys) {
            const s = sys || TS;
            return `<select id="${id}" class="form-input">${Object.entries(s).map(([k, v]) => `<option value="${k}"${k === cur ? ' selected' : ''}>${v.l}</option>`).join('')}</select>`;
        }

        // DASH
        function renderDash() {
            const p = DB.tasks.filter(t => t.status !== 'done');
            const ov = p.filter(t => isOD(t.dueDate, t.status));
            const dt = p.filter(t => t.dueDate === td());
            let h = `<div style="font-size:12px;color:#94A3B8;margin-bottom:2px">${nowFull()}</div><div style="font-size:22px;font-weight:700;margin-bottom:18px">Chairman's Office</div>
  <div class="stat-grid">
    <div class="stat-card" style="background:#F5F3FF;border:1px solid #4F46E522"><div class="stat-n" style="color:#4F46E5">${DB.projects.filter(x => x.status !== 'done').length}</div><div class="stat-l">Active projects</div></div>
    <div class="stat-card" style="background:#F0F9FF;border:1px solid #0891B222"><div class="stat-n" style="color:#0891B2">${DB.buildings.length}</div><div class="stat-l">Buildings</div></div>
    <div class="stat-card" style="background:#FFFBEB;border:1px solid #D9770622"><div class="stat-n" style="color:#D97706">${p.length}</div><div class="stat-l">Pending tasks</div></div>
    <div class="stat-card" style="background:#FEF2F2;border:1px solid #DC262622"><div class="stat-n" style="color:#DC2626">${ov.length}</div><div class="stat-l">Overdue</div></div>
  </div>`;
            if (dt.length) { h += `<div style="font-size:13px;font-weight:600;margin-bottom:10px">Due today (${dt.length})</div>`; dt.forEach(t => { const pr = DB.projects.find(p => p.id === t.projectId); const pe = DB.people.find(p => p.id === t.assignedTo); h += `<div class="card" style="border-left:3px solid ${pr?.color || '#4F46E5'}"><div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><div><div style="font-size:13px;font-weight:500">${esc(t.title)}</div><div style="font-size:11px;color:#94A3B8;margin-top:2px">${esc(pr?.name || '')}</div></div><div style="display:flex;align-items:center;gap:6px">${pe ? av(pe.name, pe.color, 22) : ''}${bdg(t.status)}</div></div></div>`; }); }
            if (ov.length) { h += `<div style="font-size:13px;font-weight:600;color:#DC2626;margin-bottom:10px;margin-top:16px">⚠ Overdue (${ov.length})</div>`; ov.slice(0, 5).forEach(t => { const pr = DB.projects.find(p => p.id === t.projectId); const pe = DB.people.find(p => p.id === t.assignedTo); h += `<div style="background:#FEF2F2;border:1px solid #FECACA;border-left:3px solid #DC2626;border-radius:10px;padding:10px 12px;margin-bottom:7px"><div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><div><div style="font-size:13px;font-weight:500;color:#991B1B">${esc(t.title)}</div><div style="font-size:11px;color:#DC2626;margin-top:2px">${fd(t.dueDate)} · ${esc(pr?.name || '')}</div></div>${pe ? av(pe.name, pe.color, 22) : ''}</div></div>`; }); }

                h += `<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">${av(person.name, person.color, 44)}<div style="flex:1"><div style="font-size:15px;font-weight:600">${esc(person.name)}</div>${person.role ? `<div style="font-size:12px;color:#64748B">${esc(person.role)}</div>` : ''}<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap"><span class="badge" style="background:#EEF2FF;color:#4338CA;border:none">${mt.length} pending</span>${od ? `<span class="badge" style="background:#FEF2F2;color:#B91C1C;border:none">${od} overdue ⚠️</span>` : ''}</div></div></div>
    <div class="msg-preview">${esc(msg)}</div>
    <div style="display:flex;gap:9px">
      <button class="copy-btn" id="cp-${person.id}" onclick="cpMsg('${person.id}')">📋 Copy</button>
      <button class="wa-btn" onclick="openWA('${person.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>WhatsApp ${esc(person.name.split(' ')[0])}</button>
    </div></div>`;
            });
            document.getElementById('tab-digest').innerHTML = h;
        }
        function cpMsg(pid) { const msg = dMsgs[pid]; if (!msg) return; navigator.clipboard.writeText(msg).catch(() => { }).finally(() => { const b = document.getElementById('cp-' + pid); if (b) { b.textContent = '✓ Copied!'; b.classList.add('copied'); setTimeout(() => { b.textContent = '📋 Copy'; b.classList.remove('copied'); }, 2000); } }); }
        function openWA(pid) { const msg = dMsgs[pid]; const p = DB.people.find(x => x.id === pid); if (!p?.phone) { alert('No WhatsApp number for ' + p?.name); return; } window.open(`https://wa.me/${p.phone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank'); }

        function renderTab(id) { if (id === 'dash') renderDash(); else if (id === 'projects') renderProjects(); else if (id === 'buildings') renderBuildings(); else if (id === 'people') renderPeople(); else if (id === 'digest') renderDigest(); }
        renderDash();
    </script>
